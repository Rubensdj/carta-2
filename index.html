<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Juliana ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;600&display=swap');

        :root {
            --primary-red: #e60000;
            --deep-red: #8b0000;
            --black: #000000;
            --white: #ffffff;
            --paper: #ffffff;
            --text-dark: #1a1a1a;
            --glow-red: rgba(230, 0, 0, 0.7);
        }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #3d0000 0%, #000000 100%);
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
        }

        /* Status de Conexão - Estilo Elegante */
        #connection-status {
            position: fixed;
            top: 30px;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--white);
            border-radius: 50%;
            animation: heartbeat 1.5s infinite;
            box-shadow: 0 0 15px var(--white);
        }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } }

        #timer {
            position: fixed;
            top: 65px;
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-red);
            font-size: 0.85rem;
            text-align: center;
            opacity: 0;
            transition: opacity 2s;
            z-index: 200;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .container {
            position: relative;
            z-index: 100;
        }

        /* Envelope Vermelho & Preto */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px var(--glow-red));
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--primary-red);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            z-index: 10;
            border: 1px solid var(--deep-red);
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 115px solid var(--deep-red);
            transform-origin: top;
            transition: transform 0.7s 0.4s ease;
            z-index: 40;
        }

        .envelope::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid var(--primary-red);
            border-right: 160px solid var(--primary-red);
            border-top: 110px solid transparent;
            z-index: 20;
        }

        .seal {
            position: absolute;
            top: 85px;
            left: 140px;
            width: 45px;
            height: 45px;
            background: var(--black);
            border-radius: 50%;
            z-index: 45;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-red);
            font-size: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 2px solid var(--primary-red);
            transition: opacity 0.3s;
        }

        .letter {
            position: absolute;
            bottom: 12px;
            left: 15px;
            width: 290px;
            height: 200px;
            background: var(--white);
            padding: 35px 25px;
            box-sizing: border-box;
            transition: transform 0.9s 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.9s 0.6s;
            z-index: 15;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow-y: auto;
        }

        .text {
            font-size: 1.4rem;
            color: var(--black);
            line-height: 28px;
            font-family: 'Great Vibes', cursive;
            text-align: left;
        }

        .text b { color: var(--primary-red); }

        .open .envelope::before { transform: rotateX(180deg); z-index: 5; }
        .open .seal { opacity: 0; }
        .open .letter { transform: translateY(-210px); height: 520px; z-index: 35; }

        .hint {
            position: fixed;
            bottom: 45px;
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
            z-index: 200;
            text-transform: uppercase;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: float-up 5s linear forwards;
            z-index: 1;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-15vh) scale(1.4) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="connection-status">
        <div class="dot"></div>
        CONEXÃO PRIVADA: RUBENS ↔ JULIANA
    </div>

    <div id="timer">ESTAMOS JUNTOS HÁ: <span id="time-elapsed"></span></div>

    <div class="container">
        <div class="envelope-wrapper" id="envelopeWrapper" onclick="openLetter()">
            <div class="envelope">
                <div class="seal">❤️</div>
            </div>
            <div class="letter">
                <div class="text" id="typewriter"></div>
            </div>
        </div>
    </div>

    <div class="hint">TOQUE PARA REVELAR</div>

    <script>
        const message = "Minha querida <b>Juliana</b>,\n\nDizem que o acaso não existe, e em <b>27 de março de 2026</b>, eu tive a prova definitiva disso. Entre tantos caminhos e tantas telas, meus olhos encontraram os seus e meu mundo ganhou uma cor que eu nem sabia que existia.\n\nObrigado por transformar uma simples conversa na minha espera favorita de todos os dias. Em <b>01 de abril</b>, o destino decidiu que não era apenas uma coincidência, mas o início da nossa história. Muitos chamam de dia da mentira, mas para nós, foi o dia em que a verdade mais linda floresceu: o nosso 'nós'.\n\nSei que hoje uma tela ainda nos separa fisicamente, mas saiba que não há distância capaz de apagar o brilho do que sentimos. Cada notificação sua é um abraço na alma, e cada palavra digitada é um beijo que guardo com carinho para o dia em que finalmente puder te olhar nos olhos.\n\nVocê é minha conexão mais profunda, minha maior certeza... minha <b>Juliana</b>.\n\nCom todo o meu amor e uma saudade que já não cabe em bytes,\nSeu Rubens ❤️";
        
        const startDate = new Date('2026-04-01T00:00:00');
        let i = 0;
        let speed = 60;
        let isOpened = false;

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('time-elapsed').innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
        }

        function openLetter() {
            if(isOpened) return;
            isOpened = true;
            
            document.getElementById('envelopeWrapper').classList.add('open');
            document.querySelector('.hint').style.display = 'none';
            document.getElementById('timer').style.opacity = '1';
            
            setInterval(updateTimer, 1000);
            setTimeout(typeWriter, 1500);
            setInterval(spawnParticles, 300);
        }

        function typeWriter() {
            if (i < message.length) {
                const char = message.charAt(i);
                // Permite tags HTML como <b>
                if (char === '<') {
                    const tagEnd = message.indexOf('>', i);
                    document.getElementById("typewriter").innerHTML += message.substring(i, tagEnd + 1);
                    i = tagEnd + 1;
                } else {
                    document.getElementById("typewriter").innerHTML += char === '\n' ? '<br>' : char;
                    i++;
                }
                setTimeout(typeWriter, speed);
            }
        }

        function spawnParticles() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const items = ['🌼', '❤️', '🌼', '✨'];
            particle.innerHTML = items[Math.floor(Math.random() * items.length)];
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.fontSize = (Math.random() * 25 + 15) + 'px';
            
            if(particle.innerHTML === '🌼' || particle.innerHTML === '✨') {
                particle.style.filter = 'drop-shadow(0 0 8px white)';
            } else {
                particle.style.filter = 'drop-shadow(0 0 8px var(--primary-red))';
            }
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 5000);
        }
    </script>
</body>
</html>
